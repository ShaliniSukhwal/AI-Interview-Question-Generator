<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Interview Question Generator</title>

    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

    <h1>🤖 AI Interview Question Generator</h1>
    <p>Generate AI-powered interview questions using Google Gemini.</p>

    <form id="interviewForm">

        <input
            type="text"
            id="role"
            placeholder="Role (Example: UI UX Designer)"
            required
        >

        <input
            type="text"
            id="company"
            placeholder="Company (Example: Google)"
            required
        >

        <input
            type="text"
            id="experience"
            placeholder="Experience (Example: 5 Years)"
            required
        >

        <select id="difficulty">
            <option>Easy</option>
            <option selected>Intermediate</option>
            <option>Hard</option>
        </select>

        <select id="question_type">
            <option>Technical</option>
            <option>HR</option>
            <option>Behavioral</option>
        </select>

        <input
            type="number"
            id="question_count"
            value="10"
            min="1"
            max="20"
        >

        <button type="submit">
            Generate Questions
        </button>

    </form>

    <div id="result"></div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
